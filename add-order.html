<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TrackCart | Add Order</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <nav class="navbar">
 <a href="index.html"><div class="logo">TrackCart</div></a>
  </nav>

  <main class="add-order-page">
    <h1>Add New Order</h1>
    <p class="page-subtext">Log a new order and generate a tracking code for your customer.</p>

    <form class="add-order-form" id="add-order-form">
     <label for="customer-name">Customer Name</label>
<input type="text" id="customer-name" name="customer-name" placeholder="e.g. Leah Johnson">

<label for="order-item">Item</label>
<input type="text" id="order-item" name="order-item" placeholder="e.g. Gold Chain">

<label for="order-price">Price</label>
<input type="text" id="order-price" name="order-price" placeholder="e.g. 15000">

<label for="order-address">Delivery Address</label>
<input type="text" id="order-address" name="order-address" placeholder="e.g. 14 Bridge Street, Lagos">

<label for="dispatch-rider">Dispatch Rider</label>
<input type="text" id="dispatch-rider" name="dispatch-rider" placeholder="e.g. Musa (Bike Rider)">
      
<label for="order-status">Status</label>
<select id="order-status" name="order-status">
  <option value="confirmed">Confirmed</option>
  <option value="packed">Packed</option>
  <option value="out-for-delivery">Out for Delivery</option>
  <option value="delivered">Delivered</option>
</select>

      <button type="submit" class="btn btn-primary">Add Order</button>
    </form>

    <p id="add-order-result"></p>
  </main>

  <script type="module" src="js/script.js"></script>
</body>
</html>
